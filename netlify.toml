[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /dashboard to dashboard.html (clean URLs)
[[redirects]]
  from = "/dashboard"
  to   = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to   = "/pricing.html"
  status = 200

[[redirects]]
  from = "/signup"
  to   = "/signup.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
